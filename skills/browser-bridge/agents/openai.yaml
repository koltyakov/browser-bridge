interface:
  display_name: "Browser Bridge"
  short_description: "Token-efficient Chrome tab inspection and patching"
  default_prompt: "Use the browser-bridge skill for Chrome tab inspection, interaction, and patching via the local bridge. In GitHub Copilot, invoke the skill by name as `browser-bridge` or `/browser-bridge`; `bbx` is the CLI command, not a portable skill alias. Start with `bbx status`, then make the intended Browser Bridge call. If that first tab-bound call returns `ACCESS_DENIED`, treat it as the access request flow: the extension popup/side panel now shows an `Enable` cue for the relevant window, so ask the user to click `Enable`, then retry once. Default routing follows the active tab in the enabled window; use `--tab` only when you intentionally need a different tab. Use structured reads (`dom.query`, `styles.get_computed`) before screenshots. If a screenshot is still needed, prefer `bbx screenshot` for an element-sized partial capture, or a tight `screenshot.capture_region` call when one element cannot express the target area. Use `bbx batch` for independent reads. Use `bbx skill` for runtime presets. Do not use Playwright or other browser automation; use browser-bridge only."
