name: CI

on:
  push:
    branches:
      - main
    paths:
      - '**/*.js'
      - '**/*.mjs'
      - '**/*.ts'
      - 'manifest.json'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.oxlintrc.json'
      - '.oxfmtrc.json'
      - 'docs/**'
      - 'skills/**'
      - 'scripts/**'
      - 'packages/extension/ui/**'
      - 'packages/extension/assets/**'
      - '.github/workflows/*.yml'
  # No paths filter on pull_request: required status checks would stay
  # pending forever on PRs that only touch unmatched files.
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-tooling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Review lowest coverage files
        run: npm run coverage:review

      - name: Check coverage threshold
        run: npm run coverage:check

      - name: Package extension
        run: npm run package:extension

      - name: Validate extension ZIP contents
        run: npm run check:extension-zip

  validate-runtime:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: [20, 22, 24]
        include:
          - os: macos-latest
            node-version: 22
          # The Windows leg activates the Named Pipe transport tests that
          # skip on other platforms. Non-blocking until proven green.
          - os: windows-latest
            node-version: 22
            experimental: true
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test:runtime
